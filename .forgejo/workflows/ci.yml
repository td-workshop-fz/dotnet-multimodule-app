name: Continuous Integration (CI)

on: [push]

jobs:
  build-and-test:
    name: Build, Test, and Quality Gate
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Publish
      run: dotnet publish --no-build --configuration Release

    - name: Docker Login
      env:
        DOCKER_HOST: tcp://localhost:2375
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login crh.anitazheng.org -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Docker Build and Push
      env:
        DOCKER_HOST: tcp://localhost:2375
      run: |
        docker build -t crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }} .
        docker tag crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }} crh.anitazheng.org/zhengt/dotnet-multimodule-app:latest
        docker push crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }}
        docker push crh.anitazheng.org/zhengt/dotnet-multimodule-app:latest

    - name: Setup kubectl
      uses: https://github.com/azure/setup-kubectl@v3

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl set image deployment/web-ui web-ui=crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }} -n dotnet-app
