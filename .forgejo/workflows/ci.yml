name: Continuous Integration (CI)

on: [push]

jobs:
  build-and-test:
    name: Build, Test, and Quality Gate
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-24.04
      options: -v /var/run/secrets/kubernetes.io/serviceaccount:/var/run/secrets/kubernetes.io/serviceaccount:ro -e KUBERNETES_SERVICE_HOST=10.96.0.1 -e KUBERNETES_SERVICE_PORT=443

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Publish
      run: dotnet publish --no-build --configuration Release

    - name: Docker Login
      env:
        DOCKER_HOST: tcp://localhost:2375
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login crh.anitazheng.org -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Docker Build and Push
      env:
        DOCKER_HOST: tcp://localhost:2375
      run: |
        docker build -t crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }} .
        docker tag crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }} crh.anitazheng.org/zhengt/dotnet-multimodule-app:latest
        docker push crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }}
        docker push crh.anitazheng.org/zhengt/dotnet-multimodule-app:latest

    - name: Setup kubectl
      uses: https://github.com/azure/setup-kubectl@v3

    - name: Docker Build and Push
      env:
        DOCKER_HOST: tcp://localhost:2375
      run: |
        docker build -t crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }} .
        docker tag crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }} crh.anitazheng.org/zhengt/dotnet-multimodule-app:latest
        docker push crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }}
        docker push crh.anitazheng.org/zhengt/dotnet-multimodule-app:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: linux
    needs: build-and-test
    steps:
    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        mv kubectl /usr/local/bin/kubectl

    - name: Checkout
      run: |
        git clone https://oauth2:${{ secrets.GITHUB_TOKEN }}@${{ github.server_url }}/${{ github.repository }}.git repo
        cd repo && git checkout ${{ github.sha }}

    - name: Deploy
      run: |
        SA_PATH=/var/run/secrets/kubernetes.io/serviceaccount
        kubectl config set-cluster local \
          --server=https://10.96.0.1:443 \
          --certificate-authority=$SA_PATH/ca.crt
        kubectl config set-credentials runner \
          --token=$(cat $SA_PATH/token)
        kubectl config set-context local --cluster=local --user=runner
        kubectl config use-context local
        kubectl apply -f repo/k8s/deployment.yaml --validate=false
        kubectl set image deployment/web-ui \
          web-ui=crh.anitazheng.org/zhengt/dotnet-multimodule-app:${{ github.sha }} \
          -n dotnet-app
