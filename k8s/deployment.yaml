apiVersion: v1
kind: Namespace
metadata:
  name: dotnet-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: dotnet-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-ui
  template:
    metadata:
      labels:
        app: web-ui
    spec:
      containers:
        - name: web-ui
          image: crh.anitazheng.org/zhengt/dotnet-multimodule-app:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui
  namespace: dotnet-app
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: web-ui
